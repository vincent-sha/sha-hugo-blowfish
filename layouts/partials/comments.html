<!-- Waline 样式 -->
<link
  rel="stylesheet"
  href="https://unpkg.com/@waline/client@v3/dist/waline.css"
/>

{{ if eq .Section "posts" }}
<div class="mb-6 rounded border border-neutral-200 bg-neutral-50 px-4 py-3 text-sm text-neutral-700 dark:border-neutral-700 dark:bg-neutral-900 dark:text-neutral-300">
  <p>本网站部分链接可能为联盟推广链接（Affiliate Links）。如果你通过这些链接购买产品或服务，站长可能获得佣金，但你无需支付额外费用。</p>
  <p>作为 Amazon Associates 计划成员，本站会从符合条件的购买中获得收益。</p>
  <p class="mt-1">As an Amazon Associate, I earn from qualifying purchases.</p>
</div>
{{ end }}

<!-- 阅读量统计显示 -->
<div id="article-info" style="margin-bottom: 1.5rem;">
  <span style="color: var(--body-text-color); font-size: 0.95rem;">
    📖 阅读量：<span class="waline-pageview-count" data-path="{{ .RelPermalink }}" />
  </span>
</div>

<!-- Waline 容器 -->
<div id="waline"></div>

<!-- Waline 初始化脚本 -->
<script type="module">
  import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

  init({
    el: '#waline',
    serverURL: 'https://example.vincentarts.top',
    locale: 'zh-CN',
    pageview: true,
    reaction: [
      'https://unpkg.com/@waline/emojis@1.1.0/tieba/tieba_agree.png',
      'https://unpkg.com/@waline/emojis@1.1.0/tieba/tieba_look_down.png',
      'https://unpkg.com/@waline/emojis@1.1.0/tieba/tieba_sunglasses.png',
      'https://unpkg.com/@waline/emojis@1.1.0/tieba/tieba_pick_nose.png',
      'https://unpkg.com/@waline/emojis@1.1.0/tieba/tieba_awkward.png',
      'https://unpkg.com/@waline/emojis@1.1.0/tieba/tieba_sleep.png',
    ],
  });
</script>
